<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Building / district icon -->
  <!-- Main tower -->
  <rect x="22" y="20" width="20" height="36" rx="1" fill="#1d4ed8"/>
  <!-- Left wing -->
  <rect x="10" y="30" width="12" height="26" rx="1" fill="#2563eb"/>
  <!-- Right wing -->
  <rect x="42" y="30" width="12" height="26" rx="1" fill="#2563eb"/>
  <!-- Windows on main tower -->
  <rect x="27" y="26" width="4" height="4" rx="0.5" fill="white" opacity="0.9"/>
  <rect x="33" y="26" width="4" height="4" rx="0.5" fill="white" opacity="0.9"/>
  <rect x="27" y="34" width="4" height="4" rx="0.5" fill="white" opacity="0.9"/>
  <rect x="33" y="34" width="4" height="4" rx="0.5" fill="white" opacity="0.9"/>
  <!-- Windows on left wing -->
  <rect x="14" y="35" width="4" height="4" rx="0.5" fill="white" opacity="0.9"/>
  <rect x="14" y="43" width="4" height="4" rx="0.5" fill="white" opacity="0.9"/>
  <!-- Windows on right wing -->
  <rect x="46" y="35" width="4" height="4" rx="0.5" fill="white" opacity="0.9"/>
  <rect x="46" y="43" width="4" height="4" rx="0.5" fill="white" opacity="0.9"/>
  <!-- Door -->
  <rect x="28" y="46" width="8" height="10" rx="1" fill="#93c5fd"/>
  <!-- Roof flag pole -->
  <rect x="31" y="12" width="2" height="8" rx="0.5" fill="#1e40af"/>
  <!-- Flag -->
  <polygon points="33,12 41,15 33,18" fill="#ef4444"/>
  <!-- Ground line -->
  <rect x="6" y="56" width="52" height="2" rx="1" fill="#1e3a8a"/>
</svg>
